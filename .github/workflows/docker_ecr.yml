      run: |
        docker build -t 833822972731/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag 833822972731/$ECR_REPOSITORY:$IMAGE_TAG 833822972731/$ECR_REPOSITORY:latest
        docker push 833822972731/$ECR_REPOSITORY:$IMAGE_TAG
        docker push 833822972731/$ECR_REPOSITORY:latest
    
